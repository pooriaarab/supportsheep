<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>G10 · Workspace logged-out · AI Interview</title>
<link rel="stylesheet" href="../shared/tokens.css" />
<style>
  body { background: hsl(var(--background)); min-height: 100vh; display: grid; place-items: center; }
  .wrap { max-width: 460px; padding: 48px 24px; }
  .state-card { padding: 32px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 14px; text-align: center; }
  .icon-big { width: 64px; height: 64px; border-radius: 50%; background: hsl(var(--info) / 0.15); color: hsl(var(--info)); display: grid; place-items: center; font-size: 28px; margin: 0 auto 16px; }
</style>
</head>
<body data-shell="banner-only">
<script src="../shared/shell.js" defer></script>
<div class="wrap">
  <div class="state-card">
    <div class="icon-big">🔐</div>
    <h1 class="h1">Sign in to join</h1>
    <p class="muted">This is a workspace-only interview. Sign in to <strong>BlogBat</strong> to continue.</p>
    <p class="text-sm muted mt-12">After sign-in, we'll bring you right back to <code class="text-xs" style="background: hsl(var(--muted)); padding: 2px 6px; border-radius: 4px;">/i/yEW4z…</code>.</p>
    <div class="col gap-12 mt-16">
      <input class="input" placeholder="you@blogbat.com" />
      <button class="btn btn-primary btn-lg">Email me a magic link →</button>
    </div>
    <div class="text-xs muted mt-16">
      Not on the BlogBat team? <a href="#">Ask your host</a> for a different kind of link.
    </div>
  </div>
</div>
</body>
</html>
