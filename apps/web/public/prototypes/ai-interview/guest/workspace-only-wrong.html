<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>G11 · Workspace · wrong workspace · AI Interview</title>
<link rel="stylesheet" href="../shared/tokens.css" />
<style>
  body { background: hsl(var(--background)); min-height: 100vh; display: grid; place-items: center; }
  .wrap { max-width: 480px; padding: 48px 24px; }
  .state-card { padding: 32px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 14px; text-align: center; }
  .icon-big { width: 64px; height: 64px; border-radius: 50%; background: hsl(var(--destructive) / 0.12); color: hsl(var(--destructive)); display: grid; place-items: center; font-size: 28px; margin: 0 auto 16px; }
  .user-chip { display: inline-flex; align-items: center; gap: 8px; padding: 6px 10px; background: hsl(var(--muted)); border-radius: 999px; font-size: 12.5px; }
  .user-chip .av { width: 18px; height: 18px; border-radius: 50%; background: hsl(var(--orb-thinking)); }
</style>
</head>
<body data-shell="banner-only">
<script src="../shared/shell.js" defer></script>
<div class="wrap">
  <div class="state-card">
    <div class="icon-big">🚷</div>
    <h1 class="h1">You don't have access</h1>
    <p class="muted">This interview is restricted to the <strong>BlogBat</strong> workspace.</p>
    <p class="text-sm muted mt-12">You're signed in as:</p>
    <span class="user-chip mt-8"><span class="av"></span>aaliyah@acme.com</span>
    <p class="text-sm muted mt-16">Switch to a BlogBat account, or ask the host for a different kind of link.</p>
    <div class="row gap-12 mt-16" style="justify-content: center;">
      <button class="btn">Switch account</button>
      <a href="mailto:pooria@blogbat.com" class="btn btn-primary">Ask host</a>
    </div>
  </div>
</div>
</body>
</html>
