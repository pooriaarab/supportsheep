<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>G2 · Email-gated landing · AI Interview</title>
<link rel="stylesheet" href="../shared/tokens.css" />
<style>
  body { background: hsl(var(--background)); min-height: 100vh; }
  .public-shell { max-width: 540px; margin: 0 auto; padding: 64px 24px; }
  .brand-row { display: flex; align-items: center; gap: 8px; font-weight: 600; color: hsl(var(--muted-foreground)); margin-bottom: 32px; }
  .invite-card { padding: 28px; background: hsl(var(--card)); border: 1px solid hsl(var(--border)); border-radius: 14px; box-shadow: 0 12px 32px hsl(0 0% 0% / 0.04); }
  .host-row { display: flex; align-items: center; gap: 12px; padding-bottom: 16px; margin-bottom: 16px; border-bottom: 1px solid hsl(var(--border)); }
  .host-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, hsl(var(--orb-speaking)), hsl(var(--orb-thinking))); }
  .topic { font-size: 18px; font-weight: 600; line-height: 1.3; margin: 8px 0 4px; }
</style>
</head>
<body data-shell="banner-only">
<script src="../shared/shell.js" defer></script>
<div class="public-shell">
  <div class="brand-row">blogbat</div>

  <div class="invite-card">
    <div class="host-row">
      <div class="host-avatar"></div>
      <div>
        <div class="text-xs muted">Invited by</div>
        <div class="font-medium">Sarah Chen · BlogBat</div>
      </div>
    </div>

    <div class="text-xs muted">Voice interview · ~10 min · 🎙️ audio</div>
    <h1 class="topic">Why you switched from Notion to BlogBat</h1>
    <p class="muted text-sm">Tell us a bit about yourself so we can credit you properly.</p>

    <div class="col gap-12 mt-16">
      <div>
        <label class="label">Your name</label>
        <input class="input" placeholder="Aaliyah Khan" />
      </div>
      <div>
        <label class="label">Email <span class="muted text-xs">— for the final article + a copy of your audio</span></label>
        <input class="input" placeholder="you@company.com" />
      </div>
      <div>
        <label class="label">Company (optional)</label>
        <input class="input" placeholder="Acme Co." />
      </div>
      <label class="row gap-12 text-sm">
        <input type="checkbox" checked />
        <span>OK to attribute by name in the published article</span>
      </label>
    </div>

    <button class="btn btn-primary btn-lg" style="width:100%; margin-top: 16px;" onclick="window.location='./consent.html'">Continue →</button>
    <div class="text-xs muted text-center mt-12">We won't email you anything else. <a href="#">Privacy</a>.</div>
  </div>
</div>
</body>
</html>
