<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>B1 · Start interview · AI Interview</title>
<link rel="stylesheet" href="../shared/tokens.css" />
<style>
  .style-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .style-grid button { border: 1px solid hsl(var(--border)); background: hsl(var(--card)); padding: 10px 10px; border-radius: 8px; text-align: left; cursor: pointer; }
  .style-grid button.active { border-color: hsl(var(--primary)); background: hsl(var(--primary) / 0.06); }
  .style-grid .title { font-size: 13px; font-weight: 500; }
  .style-grid .desc { font-size: 11.5px; color: hsl(var(--muted-foreground)); }
</style>
</head>
<body data-shell="dashboard">
<script src="../shared/shell.js" defer></script>

<div class="topbar">
  <div>
    <h1 class="h1">Dashboard</h1>
    <p class="subtle-text">Welcome back, Pooria.</p>
  </div>
</div>

<div class="card" style="filter: blur(2px); opacity: 0.6;"><p class="muted">(dashboard cards dimmed)</p></div>

<div class="overlay">
  <div class="dialog" style="max-width: 580px;">
    <div class="dialog-header">
      <div>
        <h2 class="dialog-title">Start an interview</h2>
        <div class="subtle-text mt-4">Talk through your topic. The AI asks questions and writes the post.</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="window.location='./dashboard-cta.html'">✕</button>
    </div>
    <div class="dialog-body col gap-16">
      <div>
        <label class="label">What do you want to write about?</label>
        <textarea class="input" rows="2" placeholder="e.g. our migration off Postgres to PlanetScale">our migration off Postgres to PlanetScale</textarea>
        <div class="hint">A sentence is fine. You can refine in the call.</div>
      </div>

      <div>
        <label class="label">Style</label>
        <div class="style-grid">
          <button class="active"><div class="title">🎓 EEAT</div><div class="desc">Expertise + sources</div></button>
          <button><div class="title">🧪 Case study</div><div class="desc">Problem · approach · result</div></button>
          <button><div class="title">❓ Q&amp;A</div><div class="desc">Edited transcript-as-post</div></button>
          <button><div class="title">🚀 Launch story</div><div class="desc">Origin · journey</div></button>
          <button><div class="title">📣 Testimonial</div><div class="desc">Pull-quote + context</div></button>
          <button><div class="title">🧠 Smart</div><div class="desc">AI picks</div></button>
        </div>
      </div>

      <div>
        <label class="label">Duration</label>
        <div class="row gap-12"><input type="range" min="2" max="30" value="10" style="flex:1" /><span class="badge badge-outline" style="min-width:72px; justify-content:center;">10 min</span></div>
      </div>

      <div style="background: hsl(var(--info) / 0.08); border: 1px solid hsl(var(--info) / 0.3); padding: 10px 12px; border-radius: 6px;">
        <strong style="color: hsl(var(--info));">Your role: admin</strong>
        <div class="text-sm muted mt-4">You'll be able to publish directly at the end of the call.</div>
      </div>
    </div>
    <div class="dialog-footer">
      <button class="btn">Cancel</button>
      <button class="btn btn-primary" onclick="window.location='./mic-test.html'">Continue →</button>
    </div>
  </div>
</div>
</body>
</html>
