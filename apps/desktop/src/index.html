<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Template App</title>
    <style>
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
        background: #09090b;
        color: #e4e4e7;
        height: 100vh;
        overflow: hidden;
        padding-top: var(--sat);
        padding-bottom: var(--sab);
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      .splash {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        gap: 28px;
        opacity: 1;
        transition: opacity 0.5s ease-out;
      }
      .splash.hidden { opacity: 0; pointer-events: none; }

      .mark {
        width: 52px; height: 52px;
        border-radius: 13px;
        background: linear-gradient(145deg, #18181b 0%, #27272a 100%);
        border: 1px solid rgba(255,255,255,0.06);
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; font-weight: 600; font-style: italic;
        letter-spacing: -0.03em; color: #fafafa;
        box-shadow: 0 1px 2px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
      }

      .title {
        text-align: center;
      }
      .title h1 {
        font-size: 17px; font-weight: 600; color: #fafafa;
        letter-spacing: -0.01em;
      }
      .title p {
        font-size: 13px; font-weight: 400; color: #52525b;
        margin-top: 4px; letter-spacing: 0.01em;
      }

      .spinner {
        width: 20px; height: 20px;
        border: 2px solid #27272a;
        border-top-color: #71717a;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      .status {
        font-size: 12px; color: #3f3f46;
        letter-spacing: 0.005em;
        min-height: 16px;
        transition: color 0.3s;
      }
      .status.err { color: #dc2626; }
    </style>
  </head>
  <body>
    <div class="splash" id="splash">
      <!-- SWAP: Replace "T" with your app's logo letter or SVG -->
      <div class="mark">T</div>
      <div class="title">
        <!-- SWAP: Replace with your app name -->
        <h1>Template App</h1>
        <p>Loading...</p>
      </div>
      <div class="spinner" id="spinner"></div>
      <div class="status" id="status"></div>
    </div>
    <script type="module" src="./main.ts"></script>
    <script>
      // In production builds, this splash shows while connecting to the hosted app.
      // In dev mode, Tauri's devUrl (localhost:3000) loads directly.
      //
      // SWAP: Replace PROD_URL with your deployed app URL
      const PROD_URL = 'https://your-app.netlify.app';
      const el = { status: document.getElementById('status'), splash: document.getElementById('splash') };

      if (!window.__TAURI_INTERNALS__) {
        let attempts = 0;
        async function connect() {
          attempts++;
          el.status.textContent = attempts > 1 ? 'Retrying...' : 'Connecting...';
          try {
            await fetch(PROD_URL, { method: 'HEAD', mode: 'no-cors' });
            el.status.textContent = '';
            el.splash.classList.add('hidden');
            setTimeout(() => { window.location.href = PROD_URL; }, 500);
          } catch {
            if (attempts < 10) {
              el.status.textContent = 'Waiting for network...';
              setTimeout(connect, 2000);
            } else {
              el.status.textContent = 'Could not connect. Check your internet.';
              el.status.classList.add('err');
              document.getElementById('spinner').style.display = 'none';
            }
          }
        }
        setTimeout(connect, 600);
      }
    </script>
  </body>
</html>
