name: Deploy

# main → staging.supportsheep.com ; release → production (supportsheep.com).
on:
  push:
    branches: [main, release]

# Serialize per environment; newest push to a given env wins.
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy staging
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply staging D1 migrations
        run: cd apps/web && bun run db:migrate:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build and deploy to staging.supportsheep.com
        run: cd apps/web && bun run cf:deploy:staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          # NEXT_PUBLIC_FIREBASE_* are the browser client SDK config; dummies are
          # fine for the build (server-side Firebase has been removed for D1/R2).
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_ENVIRONMENT: development
          SKIP_NEXT_BUILD_TYPECHECK: true

      # Set the custom-domain poller's shared secret on the freshly-deployed
      # worker. `wrangler deploy` does not carry an out-of-band (API-set) secret
      # into the served version, so CI sets it here (write-capable wrangler) to
      # match the standalone `supportsheep-domain-cron-staging` worker. Uses printf
      # (not echo) to avoid a trailing newline in the secret value.
      - name: Set custom-domain cron secret (staging)
        run: cd apps/web && printf '%s' "$INTERNAL_CRON_SECRET" | bunx wrangler secret put INTERNAL_CRON_SECRET --env staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}

  deploy-production:
    name: Deploy production
    if: github.ref == 'refs/heads/release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply production D1 migrations
        run: cd apps/web && bun run db:migrate:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build and deploy to supportsheep.com (production)
        run: cd apps/web && bun run cf:deploy:production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy
          NEXT_PUBLIC_ENVIRONMENT: production
          SKIP_NEXT_BUILD_TYPECHECK: true

      # Set the custom-domain poller's shared secret on the freshly-deployed
      # worker (write-capable wrangler). Mirrors the staging step so the prod
      # app worker's INTERNAL_CRON_SECRET matches the standalone
      # supportsheep-domain-cron worker. printf (not echo) avoids a trailing newline.
      - name: Set custom-domain cron secret (production)
        run: cd apps/web && printf '%s' "$INTERNAL_CRON_SECRET" | bunx wrangler secret put INTERNAL_CRON_SECRET --env production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          INTERNAL_CRON_SECRET: ${{ secrets.INTERNAL_CRON_SECRET }}
